services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: chat_password
      POSTGRES_DB: chat_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/chat-uploads --ignore-existing
        mc anonymous set download local/chat-uploads
        printf '%s' '[{"AllowedOrigins":["*"],"AllowedMethods":["GET","PUT","HEAD"],"AllowedHeaders":["*"],"ExposeHeaders":["ETag"],"MaxAgeSeconds":3000}]' > /tmp/cors.json
        mc cors set local/chat-uploads /tmp/cors.json || true

  nats:
    image: nats:2.10-alpine
    # JetStream + HTTP monitoring (8222) — required for /healthz; plain ["-js"] drops default -m and breaks healthcheck
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env.example
    ports:
      - "8080:8080"
    depends_on:
      - auth-service

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env.example
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    env_file: .env.example
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    env_file: .env.example
    ports:
      - "8083:8083"
    depends_on:
      user-service:
        condition: service_started
      message-service:
        condition: service_started
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  message-service:
    build:
      context: .
      dockerfile: services/message-service/Dockerfile
    env_file: .env.example
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: .env.example
    ports:
      - "8085:8085"
    depends_on:
      nats:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:

